name: PR Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number (for release PR builds)
        type: string
        required: true

permissions: {}

concurrency:
  group: pr-build-${{ inputs.pr_number || github.event.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build test binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR: ${{ inputs.pr_number || github.event.number }}
    steps:
      - name: Resolve PR head
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          sha=$(gh api "repos/${{ github.repository }}/pulls/${PR}" --jq .head.sha)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - name: Capture build commit info
        id: commit
        run: |
          set -eu
          short=$(git rev-parse --short=7 HEAD)
          subject=$(git log -1 --format='%s' HEAD)
          if [ ${#subject} -gt 100 ]; then
            subject="${subject:0:97}…"
          fi
          {
            echo "short=${short}"
            echo "subject=${subject}"
          } >> "$GITHUB_OUTPUT"

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web frontend
        run: |
          cd apps/gmux-web
          VERSION=pr-${{ env.PR }} npx vite build
          cd ../..

      - name: Build with Zig
        run: |
          cd .grove/teak
          zig build -Doptimize=ReleaseSafe

      - name: Package binaries
        run: |
          mkdir -p dist
          cd .grove/teak
          for os_arch in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            os=$(echo $os_arch | cut -d_ -f1)
            arch=$(echo $os_arch | cut -d_ -f2)
            # Cross-compile would require target-specific builds
            # For now, just package the native build
            if [ "$os_arch" = "linux_amd64" ]; then
              mkdir -p "dist/gmux_pr${PR}_${os}_${arch}"
              cp zig-out/bin/gmux "dist/gmux_pr${PR}_${os}_${arch}/"
              cp zig-out/bin/gmuxd "dist/gmux_pr${PR}_${os}_${arch}/"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: gmux-pr${{ env.PR }}
          path: dist/gmux_*
          retention-days: 7

      - name: Comment install instructions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHORT: ${{ steps.commit.outputs.short }}
          HEAD_SUBJECT: ${{ steps.commit.outputs.subject }}
        run: |
          set -eu
          body="<!-- gmux-pr-build -->
          ### Try this PR
          \`\`\`sh
          curl -sSfL https://gmux.app/install-pr.sh | sh -s -- ${PR}
          \`\`\`
          Built from [\`${HEAD_SHORT}\`](https://github.com/${{ github.repository }}/pull/${PR}/commits/${HEAD_SHORT}) — ${HEAD_SUBJECT}
          <sub>Requires [GitHub CLI](https://cli.github.com/) with auth. Artifacts expire after 7 days.</sub>"

          comment_id=$(gh api --paginate "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq '.[] | select(.body | startswith("<!-- gmux-pr-build -->")) | .id' | head -1)

          if [ -n "$comment_id" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${comment_id}" -X PATCH -f body="$body"
          else
            gh pr comment "${PR}" --body "$body"
          fi
