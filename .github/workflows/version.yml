name: Version

# Open/update a release PR when changesets land on main.
on:
  push:
    branches: [main]
    paths:
      - ".changesets/*.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changesets
        id: check
        run: |
          count=$(find .changesets -name '*.md' ! -name 'README.md' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Consume changesets
        if: steps.check.outputs.count != '0'
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          output=$(bash scripts/version.sh)
          version=$(echo "$output" | head -1 | awk '{print $1}')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "$output"

      - name: Prepare PR body
        if: steps.check.outputs.count != '0'
        id: body
        run: |
          {
            echo "notes<<NOTES_EOF"
            cat RELEASE_NOTES.md
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release PR
        if: steps.check.outputs.count != '0'
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "release: ${{ steps.version.outputs.version }}"
          title: "release: ${{ steps.version.outputs.version }}"
          body: |
            Release **${{ steps.version.outputs.version }}**.

            Merging creates the `${{ steps.version.outputs.version }}` tag and triggers the release build.

            ---

            ${{ steps.body.outputs.notes }}
          branch: release/next
          delete-branch: true

      - name: Add prerelease install instructions
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          pr_num="${{ steps.create-pr.outputs.pull-request-number }}"
          notes=$(cat RELEASE_NOTES.md)

          cat <<EOF | gh pr edit "$pr_num" --body-file -
          Release **${version}**.

          Merging creates the \`${version}\` tag and triggers the release build.

          ### Try this prerelease
          \`\`\`sh
          curl -sSfL https://gmux.app/install-pr.sh | sh -s -- ${pr_num}
          \`\`\`

          ---

          ${notes}
          EOF

  # When the release PR itself merges (deleting changeset files), this
  # workflow fires again. The check step finds 0 changesets and skips.
