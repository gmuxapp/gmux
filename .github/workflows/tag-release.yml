name: Tag Release

# When the release PR (branch: release/next) is merged, create the
# git tag. This triggers the existing release.yml GoReleaser workflow.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: >-
      github.event.pull_request.merged &&
      github.event.pull_request.head.ref == 'release/next'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Extract version and create tag
        run: |
          # PR title is "release: v0.5.2" — extract the version.
          title="${{ github.event.pull_request.title }}"
          version=$(echo "$title" | grep -oP 'v\d+\.\d+\.\d+')

          if [[ -z "$version" ]]; then
            echo "::error::Could not extract version from PR title '$title'"
            exit 1
          fi

          echo "Tagging $version"
          git tag "$version"
          git push origin "$version"
