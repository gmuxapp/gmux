name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS (lint, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build protocol
        run: cd packages/protocol && pnpm exec tsc -p tsconfig.json

      - name: Lint protocol
        run: cd packages/protocol && pnpm exec tsc --noEmit

      - name: Test protocol
        run: cd packages/protocol && pnpm exec vitest run --passWithNoTests

      - name: Lint web
        run: cd apps/gmux-web && pnpm exec tsc --noEmit

      - name: Test web
        run: cd apps/gmux-web && pnpm exec vitest run --passWithNoTests

      - name: Build web
        run: cd apps/gmux-web && pnpm exec vite build

  go:
    name: Go (lint, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Vet
        run: |
          go vet ./cli/gmux/...
          go vet ./packages/adapter/...
          go vet ./services/gmuxd/...
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Build
        run: |
          go build ./cli/gmux/...
          go build ./services/gmuxd/...
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Test
        run: |
          go test ./cli/gmux/...
          go test ./packages/adapter/...
          go test ./services/gmuxd/...
        env:
          GOWORK: ${{ github.workspace }}/go.work

  release-scripts:
    name: Release scripts (version.sh tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install git-cliff
        uses: taiki-e/install-action@97a5807a604e12de3a13b52d868ebecaeeea757c # v2.75.4
        with:
          tool: git-cliff

      - name: Run version.sh tests
        run: bash .github/workflows/scripts/version_test.sh
