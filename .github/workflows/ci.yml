name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS (lint, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build protocol
        run: cd packages/protocol && pnpm exec tsc -p tsconfig.json

      - name: Lint protocol
        run: cd packages/protocol && pnpm exec tsc --noEmit

      - name: Test protocol
        run: cd packages/protocol && pnpm exec vitest run --passWithNoTests

      - name: Lint web
        run: cd apps/gmux-web && pnpm exec tsc --noEmit

      - name: Test web
        run: cd apps/gmux-web && pnpm exec vitest run --passWithNoTests

      - name: Build web
        run: cd apps/gmux-web && pnpm exec vite build

  zig:
    name: Zig (build, test)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        optimize: [Debug, ReleaseSafe, ReleaseSmall]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: |
          cd .grove/teak
          zig build -Doptimize=${{ matrix.optimize }}

      - name: Test
        if: matrix.optimize == 'Debug'
        run: |
          cd .grove/teak
          zig build test

      - name: Verify binaries
        run: |
          cd .grove/teak
          zig-out/bin/gmux --help
          zig-out/bin/gmuxd version

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build gmux + frontend
        run: |
          cd .grove/teak
          zig build -Doptimize=ReleaseSafe
          cp zig-out/bin/gmux ../
          cp zig-out/bin/gmuxd ../
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          E2E_SKIP_BUILD: "1"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  release-scripts:
    name: Release scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install git-cliff
        uses: taiki-e/install-action@97a5807a604e12de3a13b52d868ebecaeeea757c # v2.75.4
        with:
          tool: git-cliff

      - name: Run version.sh tests
        run: bash .github/workflows/scripts/version_test.sh

      - name: Run notify-discord.sh tests
        run: bash .github/workflows/scripts/notify_discord_test.sh

      - name: Run extract-release-notes.sh tests
        run: bash .github/workflows/scripts/extract_release_notes_test.sh
