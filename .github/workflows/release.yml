name: Release

on:
  # Manual releases: push a tag directly.
  push:
    tags:
      - "v*"

  # Automated releases: merge the release/next PR.
  pull_request:
    types: [closed]
    branches: [main]

permissions: {}

jobs:
  release:
    # Run on tag push, OR when the release/next PR is merged.
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.merged && github.event.pull_request.head.ref == 'release/next')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push: version is the tag itself.
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # PR merge: extract version from PR title ("release: v0.6.0").
            title="${{ github.event.pull_request.title }}"
            version=$(echo "$title" | grep -oP 'v\d+\.\d+\.\d+')
            if [[ -z "$version" ]]; then
              echo "::error::Could not extract version from PR title '$title'"
              exit 1
            fi
            echo "version=$version" >> "$GITHUB_OUTPUT"

            # Create the tag (this is safe since GITHUB_TOKEN events don't
            # re-trigger workflows, avoiding loops).
            git tag "$version"
            git push origin "$version"
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GOWORK: ${{ github.workspace }}/go.work

      - name: Notify Discord
        if: always() && !cancelled()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ROLE_BREAKING: ${{ vars.DISCORD_ROLE_BREAKING }}
          ROLE_FEATURE: ${{ vars.DISCORD_ROLE_FEATURE }}
          ROLE_PATCH: ${{ vars.DISCORD_ROLE_PATCH }}
          VERSION: ${{ steps.version.outputs.version }}
        run: bash .github/workflows/scripts/notify-discord.sh

  deploy-docs:
    needs: release
    if: always() && !cancelled()
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
