name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, build, test
    runs-on: ubuntu-latest
    # One source of truth: run the same pnpm entrypoints developers run
    # locally. The actual commands live once in moon.yml (moon discovers
    # projects from the workspace globs), so CI can't drift from local.
    # `pnpm lint` = biome (--error-on-warnings, matching the root script)
    # + `moon run :lint`; build/test fan out the same way.
    env:
      GOWORK: ${{ github.workspace }}/go.work
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # moon's VCS layer needs the default branch ref to compute a
          # touched-files baseline; a shallow checkout has only the PR
          # head and makes `moon run` fail with git exit 128.
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache-dependency-path: |
            **/go.sum
            go.work.sum

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build gmux + frontend
        run: ./scripts/build.sh
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          E2E_SKIP_BUILD: "1"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  release-scripts:
    name: Release scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install git-cliff
        uses: taiki-e/install-action@97a5807a604e12de3a13b52d868ebecaeeea757c # v2.75.4
        with:
          tool: git-cliff

      - name: Run version.sh tests
        run: bash .github/workflows/scripts/version_test.sh

      - name: Run notify-discord.sh tests
        run: bash .github/workflows/scripts/notify_discord_test.sh

      - name: Run extract-release-notes.sh tests
        run: bash .github/workflows/scripts/extract_release_notes_test.sh
