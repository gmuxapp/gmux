language: javascript

tasks:
  dev:
    command: pnpm exec tsx watch src/server.ts
    deps:
      - protocol:build
    preset: server
  build:
    command: pnpm exec tsc -p tsconfig.json
    deps:
      - protocol:build
    inputs:
      - "src/**/*"
      - "tsconfig.json"
  test:
    command: pnpm exec vitest run --passWithNoTests
    deps:
      - protocol:build
  lint:
    command: pnpm exec tsc --noEmit
    deps:
      - protocol:build
