language: bash

tasks:
  dev:
    script: watchexec -r -e go -w . -w ../../packages/adapter -- 'go build -o ../../bin/gmux ./cmd/gmux && exec ../../bin/gmux pi'
    preset: server
  build:
    script: go build -o ../../bin/gmux ./cmd/gmux
    inputs:
      - "cmd/**/*"
      - "internal/**/*"
      - "go.mod"
      - "/packages/adapter/**/*.go"
  test:
    # -race guards against concurrency regressions (e.g. the ptyserver
    # Shutdown vs DSR-drain / PTY-Setsize races). The whole module is
    # race-clean; keep it that way.
    command: go test -race ./...
  lint:
    command: go vet ./...
