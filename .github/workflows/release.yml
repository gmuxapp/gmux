name: Release

on:
  # Manual releases: push a tag directly.
  push:
    tags:
      - "v*"

  # Automated releases: merge the release/next PR.
  pull_request:
    types: [closed]
    branches: [main]

permissions: {}

jobs:
  release:
    # Run on tag push, OR when the release/next PR is merged.
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.merged && github.event.pull_request.head.ref == 'release/next')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push: version is the tag itself.
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # PR merge: extract version from PR title ("release: v0.6.0").
            title="${{ github.event.pull_request.title }}"
            version=$(echo "$title" | grep -oP 'v\d+\.\d+\.\d+')
            if [[ -z "$version" ]]; then
              echo "::error::Could not extract version from PR title '$title'"
              exit 1
            fi
            echo "version=$version" >> "$GITHUB_OUTPUT"

            # Create the tag (this is safe since GITHUB_TOKEN events don't
            # re-trigger workflows, avoiding loops).
            git tag "$version"
            git push origin "$version"
          fi

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GOWORK: ${{ github.workspace }}/go.work

      - name: Notify Discord
        if: always() && !cancelled()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ROLE_BREAKING: ${{ vars.DISCORD_ROLE_BREAKING }}
          ROLE_FEATURE: ${{ vars.DISCORD_ROLE_FEATURE }}
          ROLE_PATCH: ${{ vars.DISCORD_ROLE_PATCH }}
          VERSION: ${{ steps.version.outputs.version }}
        run: bash .github/workflows/scripts/notify-discord.sh

  deploy-docs:
    needs: release
    if: always() && !cancelled()
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
