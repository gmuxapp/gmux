name: PR Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build test binaries
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gmux-pr${{ github.event.number }}
          path: dist/gmux_*
          retention-days: 7

      - name: Comment install instructions
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.number }}
        run: |
          body="<!-- gmux-pr-build -->
          ### Try this PR
          \`\`\`sh
          curl -sSfL https://gmux.app/install-pr.sh | sh -s -- ${PR}
          \`\`\`
          <sub>Requires [GitHub CLI](https://cli.github.com/) with auth. Artifacts expire after 7 days.</sub>"

          # Update existing comment or create a new one
          comment_id=$(gh api --paginate "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq '.[] | select(.body | startswith("<!-- gmux-pr-build -->")) | .id' | head -1)

          if [ -n "$comment_id" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${comment_id}" -X PATCH -f body="$body"
          else
            gh pr comment "${PR}" --body "$body"
          fi
