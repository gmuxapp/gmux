version: 2

before:
  hooks:
    - bash -c 'cd apps/gmux-web && npx vite build'
    - bash -c 'rm -rf services/gmuxd/cmd/gmuxd/web/assets services/gmuxd/cmd/gmuxd/web/favicon.svg services/gmuxd/cmd/gmuxd/web/manifest.json && cp -r apps/gmux-web/dist/* services/gmuxd/cmd/gmuxd/web/'

builds:
  - id: gmuxd
    main: ./cmd/gmuxd
    dir: services/gmuxd
    binary: gmuxd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: gmux
    main: ./cmd/gmux
    dir: cli/gmux
    binary: gmux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    ids:
      - gmuxd
      - gmux
    name_template: "gmux_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: gmux
    repository:
      owner: gmuxapp
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://gmux.app"
    description: "See every running process in your browser"
    license: "MIT"
    binaries:
      - gmux
      - gmuxd
    caveats: |
      Launch a session:
        gmux claude           # coding agent
        gmux pytest -x        # test runner
        gmux make build       # any command

      Open the dashboard:
        open http://localhost:8790
