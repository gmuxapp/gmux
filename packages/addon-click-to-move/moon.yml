language: javascript

tasks:
  dev:
    command: pnpm exec tsc --watch --preserveWatchOutput -p tsconfig.json
    preset: server
  build:
    command: pnpm exec tsc -p tsconfig.json
    inputs:
      - "src/**/*"
      - "tsconfig.json"
  test:
    command: pnpm exec vitest run --passWithNoTests
  lint:
    command: pnpm exec tsc --noEmit
