language: bash

tasks:
  dev:
    script: |
      ../../scripts/free-port.sh 8790
      exec watchexec -r -e go -- 'go build -o ../../bin/gmuxd ./cmd/gmuxd && exec ../../bin/gmuxd'
    deps:
      - gmuxr:build
    preset: server
  build:
    script: go build -o ../../bin/gmuxd ./cmd/gmuxd
    inputs:
      - "cmd/**/*"
      - "internal/**/*"
      - "go.mod"
  test:
    command: go test ./...
  lint:
    command: go vet ./...
