name: Version

# Scan for releasable commits on every push to main, or manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: version
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write # needed for gh workflow run (dispatch pr-build)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@97a5807a604e12de3a13b52d868ebecaeeea757c # v2.75.4
        with:
          tool: git-cliff

      - name: Check for releasable commits
        id: version
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          output=$(bash .github/workflows/scripts/version.sh)
          version=$(echo "$output" | head -1 | awk '{print $1}')
          if [[ -z "$version" ]]; then
            echo "No release needed."
            exit 0
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "$output"

      - name: Prepare PR body
        if: steps.version.outputs.version != ''
        id: body
        run: |
          {
            echo "notes<<NOTES_EOF"
            cat RELEASE_NOTES.md
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release PR
        if: steps.version.outputs.version != ''
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          commit-message: "release: ${{ steps.version.outputs.version }}"
          title: "release: ${{ steps.version.outputs.version }}"
          body: |
            Release **${{ steps.version.outputs.version }}**.

            Merging creates the `${{ steps.version.outputs.version }}` tag and triggers the release build.

            ---

            ${{ steps.body.outputs.notes }}
          branch: release/next
          delete-branch: true

      # peter-evans/create-pull-request restores the working directory to
      # the base branch after committing, so RELEASE_NOTES.md on disk is
      # stale. Use the output captured before the action ran.
      - name: Update PR body (add install instructions)
        if: steps.version.outputs.version != '' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          PR_NUM: ${{ steps.create-pr.outputs.pull-request-number }}
          NOTES: ${{ steps.body.outputs.notes }}
        run: |
          cat <<EOF | gh pr edit "$PR_NUM" --body-file -
          Release **${VERSION}**.

          Merging creates the \`${VERSION}\` tag and triggers the release build.

          ### Try this prerelease
          \`\`\`sh
          curl -sSfL https://gmux.app/install-pr.sh | sh -s -- ${PR_NUM}
          \`\`\`

          ---

          ${NOTES}
          EOF

      # Sticky comment showing exactly what will go to Discord and the
      # GitHub Release. Reviewers can verify wording before merging
      # without having to expand the PR body or run version.sh locally.
      - name: Post release preview comment
        if: steps.version.outputs.version != '' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ steps.create-pr.outputs.pull-request-number }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.body.outputs.notes }}
        run: |
          summary=$(printf '%s\n' "$NOTES" | sed '/<!-- highlights-end -->/,$d' | awk 'NF{p=1} p' | awk '{a[NR]=$0} END{n=NR; while(n>0 && a[n]~/^[[:space:]]*$/) n--; for(i=1;i<=n;i++) print a[i]}')
          if [[ -z "$summary" ]]; then
            summary="_(no highlights; only the changelog link will be posted)_"
          fi
          quoted=$(printf '%s\n' "$summary" | sed 's/^/> /')
          marker='<!-- gmux-release-preview -->'
          {
            printf '%s\n' "$marker"
            printf '### Discord announcement preview\n\n'
            printf 'What `notify-discord.sh` will post when this release ships:\n\n'
            printf '> ## gmux %s\n>\n' "$VERSION"
            printf '%s\n' "$quoted"
            printf '>\n> [See the changelog for details.](https://gmux.app/changelog)\n\n'
            printf 'To tweak this, edit `RELEASE_HIGHLIGHTS.md` on the `release/next` branch and run `scripts/regen-release-notes.sh` to refresh the generated files.\n'
          } > /tmp/preview.md
          existing=$(gh api "repos/$REPO/issues/$PR_NUM/comments" \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -1)
          if [[ -n "$existing" ]]; then
            # Build a proper JSON body via jq --rawfile so markdown
            # content (with quotes, backticks, control chars) is
            # always escaped correctly.
            jq -n --rawfile body /tmp/preview.md '{body: $body}' \
              | gh api -X PATCH "repos/$REPO/issues/comments/$existing" --input -
          else
            gh pr comment "$PR_NUM" --body-file /tmp/preview.md
          fi

      - name: Trigger PR build
        if: steps.version.outputs.version != '' && steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run pr-build.yml \
            --ref release/next \
            -f pr_number=${{ steps.create-pr.outputs.pull-request-number }}
