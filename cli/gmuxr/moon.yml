language: bash

tasks:
  dev:
    script: watchexec -r -e go -- 'go build -o ../../bin/gmuxr ./cmd/gmuxr && exec ../../bin/gmuxr -- pi'
    preset: server
  build:
    script: go build -o ../../bin/gmuxr ./cmd/gmuxr
    inputs:
      - "cmd/**/*"
      - "internal/**/*"
      - "go.mod"
  test:
    command: go test ./...
  lint:
    command: go vet ./...
