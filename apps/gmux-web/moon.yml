language: javascript

tasks:
  dev:
    command: pnpm exec vite
    deps:
      - protocol:build
    preset: server
  build:
    command: pnpm exec vite build
    deps:
      - protocol:build
    inputs:
      - "src/**/*"
      - "index.html"
      - "vite.config.ts"
  test:
    command: pnpm exec vitest run --passWithNoTests
    deps:
      - protocol:build
  lint:
    command: pnpm exec tsc --noEmit
    deps:
      - protocol:build
