name: Version

# Open/update a release PR when changesets land on main.
on:
  push:
    branches: [main]
    paths:
      - ".changesets/*.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changesets
        id: check
        run: |
          count=$(find .changesets -name '*.md' ! -name 'README.md' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Consume changesets
        if: steps.check.outputs.count != '0'
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Run version.sh with stdout going to both the console and a
          # variable so progress is visible even if the script fails.
          bash scripts/version.sh | tee /tmp/version-output.txt
          version=$(head -1 /tmp/version-output.txt | awk '{print $1}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Prepare PR body
        if: steps.check.outputs.count != '0'
        run: |
          version="${{ steps.version.outputs.version }}"
          cat > /tmp/pr-body.md <<EOF
          Release **${version}**.

          Merging creates the \`${version}\` tag and triggers the release build.

          ---

          $(cat RELEASE_NOTES.md)
          EOF

      - name: Create release PR
        if: steps.check.outputs.count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "release: ${{ steps.version.outputs.version }}"
          title: "release: ${{ steps.version.outputs.version }}"
          body-path: /tmp/pr-body.md
          branch: release/next
          delete-branch: true

  # When the release PR itself merges (deleting changeset files), this
  # workflow fires again. The check step finds 0 changesets and skips.
