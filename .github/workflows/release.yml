name: Release

on:
  # Manual releases: push a tag directly.
  push:
    tags:
      - "v*"

  # Automated releases: merge the release/next PR.
  pull_request:
    types: [closed]
    branches: [main]

  # Dispatched by the tag job after merging release/next.
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.3)"
        required: true

permissions: {}

jobs:
  # Lightweight job: create a tag when release/next is merged, then
  # dispatch the release build. Separated from the release job because
  # the pull_request ref (refs/pull/N/merge) does not satisfy the
  # "release" environment's branch protection rules.
  tag:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged &&
      github.event.pull_request.head.ref == 'release/next'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Create tag and dispatch release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="${{ github.event.pull_request.title }}"
          version=$(echo "$title" | grep -oP 'v\d+\.\d+\.\d+')
          if [[ -z "$version" ]]; then
            echo "::error::Could not extract version from PR title '$title'"
            exit 1
          fi
          git tag "$version"
          git push origin "$version"
          gh workflow run release.yml --ref main -f version="$version"

  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: "~> v2"
          args: release --clean --release-notes=RELEASE_NOTES.md
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GOWORK: ${{ github.workspace }}/go.work

      - name: Notify Discord
        if: always() && !cancelled()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ROLE_BREAKING: ${{ vars.DISCORD_ROLE_BREAKING }}
          ROLE_FEATURE: ${{ vars.DISCORD_ROLE_FEATURE }}
          ROLE_PATCH: ${{ vars.DISCORD_ROLE_PATCH }}
          VERSION: ${{ steps.version.outputs.version }}
        run: bash .github/workflows/scripts/notify-discord.sh

      # The release/next PR carries RELEASE_HIGHLIGHTS.md untouched so
      # editors can tweak prose right up until merge. Now that the
      # release has shipped, reset it to the stub on main so the next
      # cycle starts clean.
      - name: Clear release highlights on main
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bash .github/workflows/scripts/version.sh --clear-highlights
          if git diff --quiet RELEASE_HIGHLIGHTS.md; then
            echo "RELEASE_HIGHLIGHTS.md already clean, nothing to do"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add RELEASE_HIGHLIGHTS.md
          git commit -m "chore: clear release highlights for ${VERSION}"
          # The checkout at the start of this job is stale by now
          # (goreleaser, Discord notify, etc. take minutes). Rebase
          # onto current main so the push fast-forwards even if other
          # commits landed in the meantime.
          git pull --rebase origin main
          git push origin main

  deploy-docs:
    needs: release
    if: needs.release.result == 'success'
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
