name: Release

on:
  push:
    tags:
      - "v*"

  pull_request:
    types: [closed]
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.3)"
        required: true

permissions: {}

jobs:
  tag:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged &&
      github.event.pull_request.head.ref == 'release/next'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Tag and dispatch release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="${{ github.event.pull_request.title }}"
          version=$(echo "$title" | grep -oP 'v\d+\.\d+\.\d+')
          if [[ -z "$version" ]]; then
            echo "::error::Could not extract version from PR title '$title'"
            exit 1
          fi
          git tag "$version"
          git push origin "$version"
          gh workflow run release.yml --ref main -f version="$version"

  release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        run: |
          bash .github/workflows/scripts/extract-release-notes.sh > /tmp/release-notes.md
          echo "── /tmp/release-notes.md ──"
          cat /tmp/release-notes.md

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web frontend
        run: |
          cd apps/gmux-web
          VERSION=${{ steps.version.outputs.version }} npx vite build
          cd ../..

      - name: Build Zig binaries
        run: |
          # Linux amd64
          zig build -Doptimize=ReleaseSmall -Dtarget=x86_64-linux
          mkdir -p dist/gmux_${{ steps.version.outputs.version }}_linux_amd64
          cp zig-out/bin/gmux "dist/gmux_${{ steps.version.outputs.version }}_linux_amd64/"
          cp zig-out/bin/gmuxd "dist/gmux_${{ steps.version.outputs.version }}_linux_amd64/"

      - name: Package releases
        run: |
          cd dist
          for dir in gmux_*; do
            tar czf "${dir}.tar.gz" "$dir"
          done
          sha256sum gmux_* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${{ steps.version.outputs.version }}
          gh release create "$version" \
            --title "$version" \
            --notes-file /tmp/release-notes.md \
            dist/gmux_*.{tar.gz,zip} \
            dist/checksums.txt

      - name: Notify Discord
        if: always() && !cancelled()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ROLE_BREAKING: ${{ vars.DISCORD_ROLE_BREAKING }}
          ROLE_FEATURE: ${{ vars.DISCORD_ROLE_FEATURE }}
          ROLE_PATCH: ${{ vars.DISCORD_ROLE_PATCH }}
          VERSION: ${{ steps.version.outputs.version }}
        run: bash .github/workflows/scripts/notify-discord.sh

  deploy-docs:
    needs: release
    if: needs.release.result == 'success'
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
