name: PR Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number (for release PR builds)
        type: string
        required: true

permissions: {}

concurrency:
  group: pr-build-${{ inputs.pr_number || github.event.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build test binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      PR: ${{ inputs.pr_number || github.event.number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GOWORK: ${{ github.workspace }}/go.work

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: gmux-pr${{ env.PR }}
          path: dist/gmux_*
          retention-days: 7

      - name: Comment install instructions
        continue-on-error: true # read-only token on fork PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="<!-- gmux-pr-build -->
          ### Try this PR
          \`\`\`sh
          curl -sSfL https://gmux.app/install-pr.sh | sh -s -- ${PR}
          \`\`\`
          <sub>Requires [GitHub CLI](https://cli.github.com/) with auth. Artifacts expire after 7 days.</sub>"

          # Update existing comment or create a new one
          comment_id=$(gh api --paginate "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq '.[] | select(.body | startswith("<!-- gmux-pr-build -->")) | .id' | head -1)

          if [ -n "$comment_id" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${comment_id}" -X PATCH -f body="$body"
          else
            gh pr comment "${PR}" --body "$body"
          fi
